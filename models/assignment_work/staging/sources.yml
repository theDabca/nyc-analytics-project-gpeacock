version: 2

sources:
  - name: raw
    description: Raw data loaded from NYC Open Data
    database: nousin-rahman-cis9440
    schema: nyc_hw3_raw_data
    tables: 
      - name: source_nyc_open_restaurant_apps
        description: |
          Historic data for Open Restaurant applications, including seating types 
          and compliance information.
        columns:
          - name: objectid
            description: Unique identifier for the application record.
            tests:
              - unique
              - not_null
          - name: globalid
            description: Global unique identifier.
          - name: restaurant_name
            description: Name of the establishment.
          - name: legal_business_name
            description: Legal name of the business entity.
          - name: business_address
            description: Street address of the restaurant.
          - name: borough
            description: NYC borough where the restaurant is located.
          - name: zip
            description: Zip code of the restaurant.
          - name: seating_interest_sidewalk
            description: Indicator if the restaurant applied for sidewalk seating (both/sidewalk).
          - name: seating_interest_roadway
            description: Indicator if the restaurant applied for roadway seating (both/roadway).
          - name: sidewalk_area_length
            description: Length of the sidewalk seating area in feet.
          - name: sidewalk_area_width
            description: Width of the sidewalk seating area in feet.
          - name: roadway_area_length
            description: Length of the roadway seating area in feet.
          - name: roadway_area_width
            description: Width of the roadway seating area in feet.
          - name: food_service_establishment_permit_number
            description: DOHMH permit number for the food service establishment.
          - name: alcohol_service_type
            description: Type of alcohol service allowed (Liquor, Wine/Beer, or None).
          - name: application_date
            description: Date the application was submitted.
          - name: latitude
            description: Latitude coordinate of the restaurant.
          - name: longitude
            description: Longitude coordinate of the restaurant.
          - name: community_board
            description: Community Board district number.
          - name: council_district
            description: City Council district number.