version: 2

sources:
  - name: raw
    description: Raw NYC Open Data for Group 9 Project
    database: YOUR-PROJECT-ID-HERE
    schema: nyc_raw_data
    tables:
      - name: source_311_service_data
        description: Raw 311 Service Requests
        columns:
          - name: unique_key
            tests:
              - unique
              - not_null

      - name: source_motor_vehicle_collisions
        description: Raw NYC Motor Vehicle Collisions Data
        columns:
          - name: collision_id
            tests:
              - unique
              - not_null